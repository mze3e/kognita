name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        from kognita import Kognita, KognitaConfig
        ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full traceback if applicable.
    validations:
      required: true

  - type: input
    id: kognita_version
    attributes:
      label: Kognita version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14, Ubuntu 22.04, Windows 11…"
    validations:
      required: false

  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      options:
        - Anthropic
        - OpenAI
        - Groq
        - Google Gemini
        - Ollama
        - Custom endpoint
        - N/A
    validations:
      required: false
